<!DOCTYPE html>
<html lang="ko" data-theme="github">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitGrow - 나만의 맞춤형 습관 트래커</title>
    <style>
        /* ================= 테마 변수 설정 ================= */
        :root[data-theme="github"] {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --primary: #2ea043;
            --primary-hover: #238636;
            --grass-0: #1b2028; /* 파인 땅 느낌을 위해 살짝 어둡게 */
            --grass-completed: #2ea043; 
        }

        :root[data-theme="light"] {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --grass-0: #e2e8f0;
            --grass-completed: #93c5fd;
        }

        :root[data-theme="pastel"] {
            --bg-color: #fffbeb;
            --card-bg: #ffffff;
            --text-main: #451a03;
            --text-muted: #78350f;
            --border: #fde68a;
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --grass-0: #fef3c7;
            --grass-completed: #6ee7b7;
        }

        /* ================= 기본 스타일 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); transition: all 0.3s ease; padding: 20px; }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        /* 헤더 영역 */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .logo h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .logo p { color: var(--text-muted); font-size: 0.9rem; }
        
        .theme-selector select {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; outline: none; cursor: pointer;
        }

        /* 입력 폼 */
        .add-habit-form { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; gap: 10px; margin-bottom: 30px; }
        .add-habit-form input { flex: 1; background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border); padding: 12px; border-radius: 6px; font-size: 1rem; outline: none; }
        .add-habit-form input:focus { border-color: var(--primary); }
        .add-habit-form button { background: var(--primary); color: white; border: none; padding: 0 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        .add-habit-form button:hover { background: var(--primary-hover); }

        /* 습관 리스트 */
        .habits-container { display: flex; flex-direction: column; gap: 15px; }
        .habit-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .habit-header { display: flex; justify-content: space-between; align-items: center; }
        .habit-title-box h3 { font-size: 1.2rem; }
        .habit-streak { font-size: 0.9rem; color: var(--primary); font-weight: bold; margin-top: 5px; }
        
        .delete-btn { background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .delete-btn:hover { background: #ef4444; color: white; }

        /* ================= 30일 잔디 그리드 & 애니메이션 ================= */
        .streak-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; }
        @media(min-width: 600px) { .streak-grid { grid-template-columns: repeat(30, 1fr); gap: 6px; } }
        
        /* 심어지는 애니메이션 키프레임 */
        @keyframes plantSprout {
            0% { transform: scale(0) translateY(10px) rotate(-15deg); opacity: 0; }
            60% { transform: scale(1.3) translateY(-3px) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
        }

        .day-box { 
            aspect-ratio: 1; 
            background-color: var(--grass-0); 
            border-radius: 4px; 
            cursor: pointer; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 땅이 살짝 파여있는 듯한 입체감 */
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); 
            transition: all 0.2s ease;
        }
        
        .day-box:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }

        /* 완료된 날(잔디가 심어진 상태) */
        .day-box.completed { 
            background-color: var(--grass-completed); 
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1); /* 볼록한 느낌 */
        }
        
        /* 완료 시 나타나는 새싹 이모지 */
        .day-box.completed::before {
            content: '🌱';
            font-size: 14px; /* 새싹 크기 */
            animation: plantSprout 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); /* 이모지 그림자 */
        }
        @media(min-width: 600px) { .day-box.completed::before { font-size: 16px; } }
        
        /* 날짜 툴팁 */
        .day-box::after {
            content: attr(data-date); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 10;
        }
        .day-box:hover::after { opacity: 1; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">
            <h1>🌿 HabitGrow</h1>
            <p id="today-date"></p>
        </div>
        <div class="theme-selector">
            <select id="theme-select" onchange="changeTheme()">
                <option value="github">GitHub Dark</option>
                <option value="light">Modern Light</option>
                <option value="pastel">Pastel Meadow</option>
            </select>
        </div>
    </header>

    <div class="add-habit-form">
        <input type="text" id="habit-input" placeholder="예: 매일 물 2L 마시기, 팔굽혀펴기 50개" onkeypress="handleEnter(event)">
        <button onclick="addHabit()">추가하기</button>
    </div>

    <div class="habits-container" id="habits-list">
        </div>
</div>

<script>
    // 상태 관리 (로컬 스토리지 연동)
    let habits = JSON.parse(localStorage.getItem('habitgrow_data')) || [];

    function getTodayString() {
        const today = new Date();
        today.setHours(today.getHours() + 9);
        return today.toISOString().split('T')[0];
    }

    function init() {
        document.getElementById('today-date').innerText = `오늘은 ${getTodayString()} 입니다. 텅 빈 흙에 잔디를 심어보세요!`;
        const savedTheme = localStorage.getItem('habitgrow_theme') || 'github';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-select').value = savedTheme;
        renderHabits();
    }

    function changeTheme() {
        const theme = document.getElementById('theme-select').value;
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('habitgrow_theme', theme);
    }

    function handleEnter(e) {
        if(e.key === 'Enter') addHabit();
    }

    function addHabit() {
        const input = document.getElementById('habit-input');
        const title = input.value.trim();
        if(!title) return alert("습관을 입력해주세요!");

        const newHabit = {
            id: Date.now().toString(),
            title: title,
            history: {}
        };

        habits.unshift(newHabit);
        saveData();
        input.value = '';
        renderHabits();
    }

    function deleteHabit(id) {
        if(!confirm("정말 이 습관을 삭제하시겠습니까?")) return;
        habits = habits.filter(h => h.id !== id);
        saveData();
        renderHabits();
    }

    function toggleDay(habitId, dateStr) {
        const habit = habits.find(h => h.id === habitId);
        if(habit.history[dateStr]) {
            delete habit.history[dateStr];
        } else {
            habit.history[dateStr] = true;
        }
        saveData();
        renderHabits();
    }

    function saveData() {
        localStorage.setItem('habitgrow_data', JSON.stringify(habits));
    }

    function calculateStreak(history) {
        let streak = 0;
        let today = new Date();
        
        while(true) {
            let dateStr = today.toISOString().split('T')[0];
            if(history[dateStr]) {
                streak++;
            } else {
                if(streak === 0 && new Date().toISOString().split('T')[0] === dateStr) {
                    // 통과
                } else {
                    break;
                }
            }
            today.setDate(today.getDate() - 1);
        }
        return streak;
    }

    function getPast30Days() {
        const dates = [];
        for(let i=29; i>=0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(d.toISOString().split('T')[0]);
        }
        return dates;
    }

    function renderHabits() {
        const container = document.getElementById('habits-list');
        container.innerHTML = '';

        if(habits.length === 0) {
            container.innerHTML = '<div class="empty-state"><h3>등록된 습관이 없습니다.</h3><p>위 입력창에서 새로운 습관을 추가해 보세요!</p></div>';
            return;
        }

        const dates = getPast30Days();

        habits.forEach(habit => {
            const streak = calculateStreak(habit.history);
            
            const card = document.createElement('div');
            card.className = 'habit-card';
            
            let html = `
                <div class="habit-header">
                    <div class="habit-title-box">
                        <h3>${habit.title}</h3>
                        <div class="habit-streak">🔥 현재 ${streak}일 연속 심기 성공!</div>
                    </div>
                    <button class="delete-btn" onclick="deleteHabit('${habit.id}')">삭제</button>
                </div>
                <div class="streak-grid">
            `;

            dates.forEach(dateStr => {
                const isCompleted = habit.history[dateStr] ? 'completed' : '';
                html += `<div class="day-box ${isCompleted}" data-date="${dateStr}" onclick="toggleDay('${habit.id}', '${dateStr}')"></div>`;
            });

            html += `</div>`;
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    init();
</script>
</body>
</html>
