<!DOCTYPE html>
<html lang="ko" data-theme="github">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitGrow v4.2 - 완벽한 개별 애니메이션 & 통계 트래커</title>
<style>
/* ==================================================
   Growing Grass System
================================================== */

/* 빈 땅 (입체감 추가) */
.day-cell { 
    aspect-ratio: 1; 
    position: relative; 
    border-radius: 5px; 
    background: var(--border); 
    cursor: pointer; 
    transition: transform 0.1s ease;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.15); 
}
.day-cell:hover { transform: translateY(-2px); }

/* 심어진 땅 */
.day-cell.completed {
    background: transparent;
    box-shadow: none;
}

/* 🌿 식물 이모지 공통 스타일 */
.sprout-emoji {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
    transition: all 0.3s ease;
}

/* 🎯 방금 클릭한 칸에만 적용될 팝(Pop) 애니메이션 */
.sprout-emoji.animate-pop {
    animation: popSprout 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popSprout {
    0% { transform: scale(0.1) translateY(15px); opacity: 0; }
    60% { transform: scale(1.3) translateY(-3px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}

/* ==================================================
   Plant Levels
   1일: 새싹 (🌱)
   2일: 잔디 (🌿)
   3~4일: 나무 (🌳)
   5~6일: 소나무 (🌲)
   7일 이상: 야자수 (🌴)
================================================== */
.sprout-emoji.level1::before { content: "🌱"; }
.sprout-emoji.level2::before { content: "🌿"; }
.sprout-emoji.level3::before { content: "🌳"; }
.sprout-emoji.level4::before { content: "🌲"; }
.sprout-emoji.level5::before { content: "🌴"; }

/* ==================================================
   Modal 준비
================================================== */
.modal-backdrop { display:none; position:fixed; inset:0; background: rgba(0,0,0,.5); align-items:center; justify-content:center; z-index:1000; }
.modal { background: var(--card-bg); color: var(--text-main); padding:25px; border-radius:15px; width:90%; max-width:400px; }
.modal button { margin-top:15px; padding:10px 20px; border-radius:8px; cursor:pointer; }

/* ==================================================
   Theme System
================================================== */
:root[data-theme="github"] { --bg-color:#0d1117; --card-bg:#161b22; --text-main:#c9d1d9; --text-muted:#8b949e; --border:#30363d; --primary:#2ea043; --primary-hover:#238636; }
:root[data-theme="light"] { --bg-color:#f3f4f6; --card-bg:#ffffff; --text-main:#1f2937; --text-muted:#6b7280; --border:#e5e7eb; --primary:#3b82f6; --primary-hover:#2563eb; }
:root[data-theme="pastel"] { --bg-color:#fffbeb; --card-bg:#ffffff; --text-main:#451a03; --text-muted:#78350f; --border:#fde68a; --primary:#f59e0b; --primary-hover:#d97706; }

/* ==================================================
   Reset & Layout
================================================== */
* { box-sizing:border-box; margin:0; padding:0; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
body { background: var(--bg-color); color: var(--text-main); min-height:100vh; padding:20px; transition:.3s; }
button, input, select { font-family:inherit; }

.container { width:100%; max-width:900px; margin:auto; }
header { display:flex; justify-content:space-between; align-items:center; padding-bottom:20px; margin-bottom:25px; border-bottom: 1px solid var(--border); }
.logo h1 { font-size:2rem; }
.logo p { margin-top:5px; color: var(--text-muted); font-size:.9rem; }
.theme-selector select { padding:8px 12px; border-radius:8px; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); }

/* ==================================================
   Add Habit & Cards
================================================== */
.add-habit-form { display:flex; gap:10px; background: var(--card-bg); border: 1px solid var(--border); padding:20px; border-radius:14px; margin-bottom:25px; }
.add-habit-form input { flex:1; padding:12px; border-radius:8px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main); outline:none; }
.add-habit-form input:focus { border-color: var(--primary); }
.primary-btn { background: var(--primary); color:white; border:none; padding: 0 25px; border-radius:8px; cursor:pointer; font-weight:bold; }
.primary-btn:hover { background: var(--primary-hover); }

.habits-container { display:flex; flex-direction:column; gap:18px; }
.habit-card { background: var(--card-bg); border: 1px solid var(--border); border-radius:16px; padding:20px; }
.habit-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.habit-title { font-size:1.25rem; font-weight:bold; }
.stats { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.stat { background: var(--bg-color); border: 1px solid var(--border); padding:5px 10px; border-radius:20px; font-size:.8rem; }
.delete-btn { color:#ef4444; background:none; border: 1px solid #ef4444; border-radius:6px; padding:5px 10px; cursor:pointer; }
.delete-btn:hover { background:#ef4444; color:white; }

/* ==================================================
   Grass Grid
================================================== */
.grass-grid { display:grid; grid-template-columns: repeat(15,1fr); gap:5px; }
@media(min-width:600px){ .grass-grid { grid-template-columns: repeat(30,1fr); gap:6px; } }

/* ==================================================
  Mobile
================================================== */
@media(max-width:600px){
    body { padding:12px; }
    header { flex-direction:column; align-items:flex-start; gap:15px; }
    .add-habit-form { flex-direction:column; }
    .primary-btn { height:42px; }
    .habit-header { align-items:flex-start; gap:10px; }
    .grass-grid { grid-template-columns: repeat(15,1fr); gap:4px; }
    .habit-card { padding:15px; }
    .sprout-emoji { font-size: 18px; } 
}
</style>
</head>

<body>
<div class="container">
    <header>
        <div class="logo">
            <h1>🌿 HabitGrow v4.2</h1>
            <p id="today-text"></p>
        </div>
        <div class="theme-selector">
            <select id="theme-select">
                <option value="github">GitHub Dark</option>
                <option value="light">Modern Light</option>
                <option value="pastel">Pastel Meadow</option>
            </select>
        </div>
    </header>

    <div class="add-habit-form">
        <input id="habit-input" maxlength="50" placeholder="예: 물 2L 마시기, 운동하기">
        <button class="primary-btn" id="add-btn">추가하기</button>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="primary-btn" onclick="exportData()">📦 백업</button>
        <label class="primary-btn" style="cursor:pointer; padding:12px 20px;">
            📂 복원
            <input type="file" accept=".json" hidden onchange="importData(event)">
        </label>
    </div>

    <div id="habit-list" class="habits-container"></div>

    <div class="modal-backdrop">
        <div class="modal">
            <h3>정말 삭제할까요?</h3>
            <p>삭제하면 해당 습관 기록도 사라집니다.</p>
            <button onclick="confirmDelete()">삭제</button>
            <button onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<script>
// ==================================================
// Core Data System
// ==================================================
const STORAGE_KEY = "habitgrow_data_v4";
let habits = loadData();

function loadData(){
    try {
        const data = localStorage.getItem(STORAGE_KEY) || localStorage.getItem("habitgrow_data_v2") || localStorage.getItem("habitgrow_data");
        if(data) return JSON.parse(data);
        return [];
    } catch(error){
        return [];
    }
}

function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
}

// ==================================================
// Date System 
// ==================================================
function getKSTDate(){
    const koreaTime = new Date(new Date().getTime() + (9 * 60 * 60 * 1000));
    return koreaTime.toISOString().split("T")[0];
}

function addDays(dateString, amount){
    const parts = dateString.split('-');
    const date = new Date(parts[0], parts[1] - 1, parts[2]); 
    date.setDate(date.getDate() + amount);
    
    const yy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    return `${yy}-${mm}-${dd}`;
}

function getLast30Days(){
    const result=[];
    const today = getKSTDate();
    for(let i=29; i>=0; i--){
        result.push(addDays(today, -i));
    }
    return result; 
}

// ==================================================
// Statistics
// ==================================================
function getCompletedCount(history){ return Object.values(history).filter(Boolean).length; }

function calculateCurrentStreak(history){
    let streak = 0;
    let current = getKSTDate();
    if(!history[current]) current = addDays(current, -1);
    while(history[current]){
        streak++;
        current = addDays(current, -1);
    }
    return streak;
}

function calculateBestStreak(history){
    const dates = Object.keys(history).filter(d=>history[d]).sort();
    let best=0, current=0, previous=null;
    dates.forEach(date=>{
        if(previous && addDays(previous, 1)===date) { current++; }
        else { current=1; }
        if(current>best) best=current;
        previous=date;
    });
    return best;
}

// 🐛 버그 수정 완료: 무조건 화면에 보이는 30칸을 기준으로 계산합니다!
function calculateSuccessRate(history){
    const totalBoxes = 30; // 무조건 30칸 기준
    const dates = getLast30Days(); 
    let checkedCount = 0;
    
    // 화면에 보이는 30개의 날짜 중 체크된 칸이 몇 개인지 세어줍니다.
    dates.forEach(date => {
        if(history[date] === true) {
            checkedCount++;
        }
    });
    
    // 예: 1칸 체크 시 (1 / 30) * 100 = 3.333... -> 3%
    if (checkedCount === 0) return 0;
    return Math.floor((checkedCount / totalBoxes) * 100);
}

// ==================================================
// Plant Growth 
// ==================================================
function getStreakAtDate(history, dateStr) {
    let streak = 0;
    let current = dateStr;
    while(history[current]) {
        streak++;
        current = addDays(current, -1);
    }
    return streak;
}

function getPlantLevel(history, dateStr){
    const streak = getStreakAtDate(history, dateStr);
    if(streak >= 7) return 5;
    if(streak >= 5) return 4;
    if(streak >= 3) return 3;
    if(streak >= 2) return 2;
    return 1;
}

// ==================================================
// Habit Objects & UI
// ==================================================
function createHabit(title){
    return { id: Date.now().toString(), title, history:{}, createdAt: getKSTDate() };
}

const habitList = document.getElementById("habit-list");
const habitInput = document.getElementById("habit-input");

document.getElementById("add-btn").addEventListener("click", addHabit);
habitInput.addEventListener("keydown", e=>{ if(e.key==="Enter") addHabit(); });

function addHabit(){
    const title = habitInput.value.trim();
    if(!title){ alert("습관을 입력해주세요."); return; }
    if(habits.some(h=>h.title===title)){ alert("이미 존재하는 습관입니다."); return; }
    habits.unshift(createHabit(title));
    saveData();
    habitInput.value="";
    renderFull(); 
}

// ==================================================
// Toggle Day
// ==================================================
function toggleDay(habitId, date){
    const habit = habits.find(h=>h.id===habitId);
    if(!habit) return;
    
    if(habit.history[date]){ delete habit.history[date]; }
    else{ habit.history[date]=true; }
    saveData();
    
    updateHabitCard(habitId, date);
}

function updateHabitCard(habitId, clickedDate) {
    const habit = habits.find(h => h.id === habitId);
    const card = document.querySelector(`.habit-card[data-id="${habitId}"]`);
    if(!card) return;

    const current = calculateCurrentStreak(habit.history);
    const best = calculateBestStreak(habit.history);
    const total = getCompletedCount(habit.history);
    const rate = calculateSuccessRate(habit.history);

    card.querySelector('.stat-current').innerText = `🔥 ${current}일 연속`;
    card.querySelector('.stat-best').innerText = `🏆 최장 ${best}일`;
    card.querySelector('.stat-total').innerText = `🌱 총 ${total}회`;
    // 새로 계산된 달성률(%) 텍스트 렌더링
    card.querySelector('.stat-rate').innerText = `📈 달성률 ${rate}%`;

    const cells = card.querySelectorAll('.day-cell');
    cells.forEach(cell => {
        const date = cell.getAttribute('data-date');
        const isCompleted = habit.history[date];
        const existingPlant = cell.querySelector('.sprout-emoji');

        if (isCompleted) {
            cell.classList.add('completed');
            const level = getPlantLevel(habit.history, date);
            const targetClassName = `sprout-emoji level${level}`;

            if (existingPlant) {
                existingPlant.className = targetClassName;
            } else {
                const plant = document.createElement('div');
                plant.className = targetClassName;
                if (date === clickedDate) {
                    plant.classList.add('animate-pop');
                }
                cell.appendChild(plant);
            }
        } else {
            cell.classList.remove('completed');
            if (existingPlant) {
                existingPlant.remove();
            }
        }
    });
}

// ==================================================
// Delete Habit & Modals
// ==================================================
let deleteTarget=null;
function deleteHabit(id){
    deleteTarget=id;
    const modal = document.querySelector(".modal-backdrop");
    if(modal) modal.style.display="flex";
}
function confirmDelete(){
    habits = habits.filter(h=>h.id!==deleteTarget);
    saveData();
    closeModal();
    renderFull();
}
function closeModal(){
    const modal = document.querySelector(".modal-backdrop");
    if(modal) modal.style.display="none";
}

// ==================================================
// Full Render
// ==================================================
function renderFull(){
    habitList.innerHTML="";
    if(habits.length===0){
        habitList.innerHTML=`<div class="habit-card" style="text-align:center; padding:40px;"><h3 style="margin-bottom:10px;">🌱 아직 심은 습관이 없습니다.</h3><p style="color:var(--text-muted);">새로운 습관을 추가해서 나만의 정원을 만들어보세요.</p></div>`;
        return;
    }

    const dates = getLast30Days();

    habits.forEach(habit=>{
        const card = document.createElement("div");
        card.className="habit-card";
        card.setAttribute("data-id", habit.id); 
        
        const current = calculateCurrentStreak(habit.history);
        const best = calculateBestStreak(habit.history);
        const total = getCompletedCount(habit.history);
        const rate = calculateSuccessRate(habit.history);

        card.innerHTML=`
        <div class="habit-header">
            <div>
                <div class="habit-title">${escapeHTML(habit.title)}</div>
                <div class="stats">
                    <div class="stat stat-current">🔥 ${current}일 연속</div>
                    <div class="stat stat-best">🏆 최장 ${best}일</div>
                    <div class="stat stat-total">🌱 총 ${total}회</div>
                    <div class="stat stat-rate">📈 달성률 ${rate}%</div>
                </div>
            </div>
            <button class="delete-btn" onclick="deleteHabit('${habit.id}')">삭제</button>
        </div>
        <div class="grass-grid"></div>
        `;

        const grid = card.querySelector(".grass-grid");
        
        dates.forEach(date=>{
            const cell = document.createElement("div");
            cell.className="day-cell";
            cell.setAttribute("data-date", date);
            
            if(habit.history[date]){
                cell.classList.add("completed");
                const level = getPlantLevel(habit.history, date);
                const plant = document.createElement("div");
                plant.className = `sprout-emoji level${level}`;
                cell.appendChild(plant);
            }
            
            cell.title=date;
            cell.addEventListener("click", ()=>toggleDay(habit.id, date));
            grid.appendChild(cell);
        });

        habitList.appendChild(card);
    });
}

function escapeHTML(str){
    return str.replace(/[&<>"']/g, char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[char]);
}

// ==================================================
// Theme Management
// ==================================================
const themeSelect = document.getElementById("theme-select");
themeSelect.addEventListener("change", ()=>{
    const theme = themeSelect.value;
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("habitgrow_theme", theme);
});

function loadTheme(){
    const theme = localStorage.getItem("habitgrow_theme") || "github";
    document.documentElement.setAttribute("data-theme", theme);
    themeSelect.value=theme;
}

// ==================================================
// Backup / Restore
// ==================================================
function exportData(){
    const blob = new Blob([JSON.stringify(habits, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url;
    a.download="HabitGrow_backup.json";
    a.click();
    URL.revokeObjectURL(url);
}

function importData(event){
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
        try{
            const data = JSON.parse(e.target.result);
            if(Array.isArray(data)){
                habits=data;
                saveData();
                renderFull();
                alert("복원이 완료되었습니다.");
            }
        }catch(error){
            alert("올바른 백업 파일이 아닙니다.");
        }
    };
    reader.readAsText(file);
}

// ==================================================
// Init
// ==================================================
function init(){
    document.getElementById("today-text").textContent = `오늘은 ${getKSTDate()} 입니다. 나만의 정원을 키워보세요 🌱`;
    loadTheme();
    renderFull(); 
}

init();
</script>
</body>
</html>
