<!DOCTYPE html>
<html lang="ko" data-theme="github">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitGrow v7.0 - 1년 대형 정원 트래커</title>
<style>
/* ==================================================
   Growing Grass System
================================================== */
.day-cell { 
    aspect-ratio: 1; position: relative; border-radius: 5px; background: var(--border); 
    cursor: pointer; transition: transform 0.1s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.15); 
}
.day-cell:hover { transform: translateY(-2px); }
.day-cell.completed { background: transparent; box-shadow: none; }

.day-cell.disabled {
    pointer-events: none; box-shadow: none;
    background: repeating-linear-gradient(45deg, rgba(0,0,0,0.03), rgba(0,0,0,0.03) 4px, rgba(0,0,0,0.08) 4px, rgba(0,0,0,0.08) 8px);
}
:root[data-theme="github"] .day-cell.disabled {
    background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 4px, rgba(255,255,255,0.04) 4px, rgba(255,255,255,0.04) 8px);
}

.sprout-emoji {
    position: absolute; inset: 0; display: flex; justify-content: center; align-items: center;
    font-size: 24px; z-index: 5; pointer-events: none;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); transition: all 0.3s ease;
}

.sprout-emoji.animate-pop { animation: popSprout 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popSprout {
    0% { transform: scale(0.1) translateY(15px); opacity: 0; }
    60% { transform: scale(1.3) translateY(-3px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}
.sprout-emoji.level1::before { content: "🌱"; }
.sprout-emoji.level2::before { content: "🌿"; }
.sprout-emoji.level3::before { content: "🌳"; }
.sprout-emoji.level4::before { content: "🌲"; }
.sprout-emoji.level5::before { content: "🌴"; }

/* ==================================================
   Yearly Garden System (1년 기록)
================================================== */
.yearly-grid-container {
    width: 100%; overflow-x: auto; padding: 10px 5px 20px 5px; scrollbar-width: thin;
}
.yearly-grid {
    display: grid; grid-template-rows: repeat(7, 14px); grid-auto-flow: column; gap: 4px;
    width: max-content; margin: 0 auto;
}
.yearly-cell {
    width: 14px; height: 14px; background: var(--border); border-radius: 3px; transition: transform 0.2s;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
}
.yearly-cell.hidden { background: transparent; box-shadow: none; pointer-events: none; }
.yearly-cell.completed { background: var(--primary); box-shadow: none; }
.yearly-cell.disabled {
    background: repeating-linear-gradient(45deg, rgba(0,0,0,0.03), rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 6px);
    box-shadow: none;
}
:root[data-theme="github"] .yearly-cell.disabled {
    background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 3px, rgba(255,255,255,0.04) 3px, rgba(255,255,255,0.04) 6px);
}
.yearly-cell:hover:not(.hidden) { transform: scale(1.3); z-index: 10; position: relative; }

/* ==================================================
   Badge & Modal UI
================================================== */
.badge-board {
    background: var(--card-bg); border: 1px solid var(--border); padding: 15px 20px;
    border-radius: 14px; margin-bottom: 25px; display: flex; justify-content: space-around;
}
.badge-item { display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3; filter: grayscale(100%); transition: all 0.4s ease; text-align: center; }
.badge-item.earned { opacity: 1; filter: grayscale(0%); transform: scale(1.1); }
.badge-icon { font-size: 2.2rem; margin-bottom: 5px; }
.badge-name { font-size: 0.85rem; font-weight: bold; color: var(--text-muted); }
.badge-item.earned .badge-name { color: var(--primary); }

@keyframes badgeUnlock {
    0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    50% { transform: scale(1.2) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.modal-badge-icon { font-size: 4rem; animation: badgeUnlock 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-bottom: 10px; }

.modal-backdrop { display:none; position:fixed; inset:0; background: rgba(0,0,0,.5); align-items:center; justify-content:center; z-index:1000; padding: 20px; }
.modal { background: var(--card-bg); color: var(--text-main); padding:25px; border-radius:15px; width:90%; max-width:400px; text-align: center; max-height: 90vh; display: flex; flex-direction: column; }
.modal-large { max-width: 800px; width: 100%; } /* 1년 정원용 넓은 모달 */
.modal button { margin-top:15px; padding:10px 20px; border-radius:8px; cursor:pointer; }
.delete-modal { text-align: left; }

/* ==================================================
   Theme System
================================================== */
:root[data-theme="github"] { --bg-color:#0d1117; --card-bg:#161b22; --text-main:#c9d1d9; --text-muted:#8b949e; --border:#30363d; --primary:#2ea043; --primary-hover:#238636; }
:root[data-theme="light"] { --bg-color:#f3f4f6; --card-bg:#ffffff; --text-main:#1f2937; --text-muted:#6b7280; --border:#e5e7eb; --primary:#3b82f6; --primary-hover:#2563eb; }
:root[data-theme="pastel"] { --bg-color:#fffbeb; --card-bg:#ffffff; --text-main:#451a03; --text-muted:#78350f; --border:#fde68a; --primary:#f59e0b; --primary-hover:#d97706; }

/* ==================================================
   Reset & Layout
================================================== */
* { box-sizing:border-box; margin:0; padding:0; font-family: Pretendard, Apple SD Gothic Neo, sans-serif; }
body { background: var(--bg-color); color: var(--text-main); min-height:100vh; padding:20px; transition:.3s; }
button, input, select { font-family:inherit; }
.container { width:100%; max-width:900px; margin:auto; }
header { display:flex; justify-content:space-between; align-items:center; padding-bottom:20px; margin-bottom:20px; border-bottom: 1px solid var(--border); }
.logo h1 { font-size:2rem; }
.logo p { margin-top:5px; color: var(--text-muted); font-size:.9rem; }
.theme-selector select { padding:8px 12px; border-radius:8px; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); }

/* ==================================================
   Add Habit & Cards
================================================== */
.add-habit-form { display:flex; flex-direction:column; gap:15px; background: var(--card-bg); border: 1px solid var(--border); padding:20px; border-radius:14px; margin-bottom:25px; }
.add-habit-row { display: flex; gap: 10px; }
.add-habit-row input { flex:1; padding:12px; border-radius:8px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main); outline:none; }
.add-habit-row input:focus { border-color: var(--primary); }
.primary-btn { background: var(--primary); color:white; border:none; padding: 0 25px; border-radius:8px; cursor:pointer; font-weight:bold; }
.primary-btn:hover { background: var(--primary-hover); }

.day-selector-container { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
.day-selector-label { font-weight: bold; color: var(--text-muted); }
.day-btns { display: flex; gap: 5px; }
.day-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg-color); color: var(--text-muted); border: 1px solid var(--border); cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: all 0.2s; user-select: none; }
.day-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

.habits-container { display:flex; flex-direction:column; gap:18px; }
.habit-card { background: var(--card-bg); border: 1px solid var(--border); border-radius:16px; padding:20px; cursor: grab; }
.habit-card:active { cursor: grabbing; }
.habit-card.dragging { opacity: 0.5; border: 2px dashed var(--primary); transform: scale(0.98); }
.habit-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.drag-handle { color: var(--text-muted); margin-right: 12px; font-size: 1.2rem; cursor: grab; user-select: none; }
.habit-title { font-size:1.25rem; font-weight:bold; display: flex; align-items: center; gap: 10px; }
.habit-days-badge { font-size: 0.75rem; background: var(--border); padding: 3px 8px; border-radius: 12px; font-weight: normal; color: var(--text-muted); }

.action-btns { display: flex; gap: 6px; }
.icon-btn { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
.icon-btn:hover { border-color: var(--primary); color: var(--primary); }
.icon-btn.danger:hover { border-color: #ef4444; color: #ef4444; }

.stats { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.stat { background: var(--bg-color); border: 1px solid var(--border); padding:5px 10px; border-radius:20px; font-size:.8rem; }

/* ==================================================
   Grass Grid
================================================== */
.grass-grid { display:grid; grid-template-columns: repeat(15,1fr); gap:5px; }
@media(min-width:600px){ .grass-grid { grid-template-columns: repeat(30,1fr); gap:6px; } }

/* ==================================================
  Mobile
================================================== */
@media(max-width:600px){
    body { padding:12px; }
    header { flex-direction:column; align-items:flex-start; gap:15px; }
    .add-habit-row { flex-direction:column; }
    .primary-btn { height:42px; }
    .day-selector-container { flex-direction: column; align-items: flex-start; }
    .habit-header { flex-direction: column; align-items:flex-start; gap:12px; }
    .action-btns { width: 100%; justify-content: flex-end; }
    .grass-grid { grid-template-columns: repeat(15,1fr); gap:4px; }
    .habit-card { padding:15px; }
    .sprout-emoji { font-size: 18px; } 
    .yearly-cell { width: 12px; height: 12px; }
    .yearly-grid { grid-template-rows: repeat(7, 12px); }
}
</style>
</head>

<body>
<div class="container">
    <header>
        <div class="logo">
            <h1>🌿 HabitGrow v7.0</h1>
            <p id="today-text"></p>
        </div>
        <div class="theme-selector">
            <select id="theme-select">
                <option value="github">GitHub Dark</option>
                <option value="light">Modern Light</option>
                <option value="pastel">Pastel Meadow</option>
            </select>
        </div>
    </header>

    <div class="badge-board" id="badge-board">
        <div class="badge-item" id="badge-tree">
            <div class="badge-icon">🌳</div>
            <div class="badge-name">첫 나무 달성</div>
        </div>
        <div class="badge-item" id="badge-month">
            <div class="badge-icon">🔥</div>
            <div class="badge-name">30일 연속</div>
        </div>
        <div class="badge-item" id="badge-five">
            <div class="badge-icon">🖐️</div>
            <div class="badge-name">습관 5개 동시</div>
        </div>
    </div>

    <div class="add-habit-form">
        <div class="add-habit-row">
            <input id="habit-input" maxlength="50" placeholder="예: 월수금 헬스장 가기">
            <button class="primary-btn" id="add-btn">추가하기</button>
        </div>
        <div class="day-selector-container">
            <span class="day-selector-label">🗓️ 목표 요일:</span>
            <div class="day-btns">
                <div class="day-btn active" data-val="1">월</div>
                <div class="day-btn active" data-val="2">화</div>
                <div class="day-btn active" data-val="3">수</div>
                <div class="day-btn active" data-val="4">목</div>
                <div class="day-btn active" data-val="5">금</div>
                <div class="day-btn active" data-val="6">토</div>
                <div class="day-btn active" data-val="0">일</div>
            </div>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="primary-btn" onclick="exportData()">📦 백업</button>
        <label class="primary-btn" style="cursor:pointer; padding:12px 20px;">
            📂 복원
            <input type="file" accept=".json" hidden onchange="importData(event)">
        </label>
    </div>

    <div id="habit-list" class="habits-container"></div>

    <div class="modal-backdrop" id="yearly-modal">
        <div class="modal modal-large">
            <h2 id="yearly-modal-title" style="margin-bottom: 5px;">습관 1년 기록</h2>
            <p id="yearly-modal-subtitle" style="margin-bottom: 15px; color: var(--text-muted); font-size: 0.9rem;"></p>
            <div class="yearly-grid-container" id="yearly-container">
                <div class="yearly-grid" id="yearly-grid-content"></div>
            </div>
            <button class="primary-btn" onclick="closeYearlyModal()" style="align-self: center; width: 200px;">닫기</button>
        </div>
    </div>

    <div class="modal-backdrop" id="delete-modal">
        <div class="modal delete-modal">
            <h3>정말 삭제할까요?</h3>
            <p style="margin-top: 5px; color: var(--text-muted);">삭제하면 해당 습관 기록도 사라집니다.</p>
            <div style="text-align: right;">
                <button style="background: none; border: 1px solid #ef4444; color: #ef4444;" onclick="closeDeleteModal()">취소</button>
                <button class="primary-btn" style="background: #ef4444; color: white;" onclick="confirmDelete()">삭제</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="badge-modal">
        <div class="modal">
            <div class="modal-badge-icon" id="badge-modal-icon">🏆</div>
            <h2 id="badge-modal-title" style="margin-bottom: 10px; color: var(--primary);">새로운 배지 획득!</h2>
            <p id="badge-modal-desc" style="margin-bottom: 20px; color: var(--text-muted);">조건을 달성하셨습니다.</p>
            <button class="primary-btn" onclick="closeBadgeModal()" style="width: 100%;">멋지다! (확인)</button>
        </div>
    </div>
</div>

<script>
// ==================================================
// 🔊 Audio System
// ==================================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function playPopSound() {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.1);
}

// ==================================================
// 요일 선택기 로직
// ==================================================
document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => { btn.classList.toggle('active'); });
});
function getSelectedDays() {
    const activeBtns = document.querySelectorAll('.day-btn.active');
    return Array.from(activeBtns).map(btn => parseInt(btn.getAttribute('data-val')));
}

// ==================================================
// Core Data System
// ==================================================
const STORAGE_KEY = "habitgrow_data_v7";
let habits = loadData();
let badges = JSON.parse(localStorage.getItem("habitgrow_badges")) || { tree: false, month: false, five: false };

const BADGE_INFO = {
    tree: { icon: '🌳', title: '첫 나무 달성!', desc: '대단해요! 3일 연속 목표를 달성했습니다.' },
    month: { icon: '🔥', title: '30일 연속 달성!', desc: '엄청난 끈기입니다! 한 달 내내 꾸준히 달성하셨네요.' },
    five: { icon: '🖐️', title: '습관 5개 마스터!', desc: '하루에 무려 5개의 습관을 완료하셨습니다.' }
};

function loadData(){
    try {
        const data = localStorage.getItem(STORAGE_KEY) || localStorage.getItem("habitgrow_data_v6") || localStorage.getItem("habitgrow_data_v5") || localStorage.getItem("habitgrow_data_v4");
        if(data) {
            let parsed = JSON.parse(data);
            parsed.forEach(h => { if(!h.targetDays) h.targetDays = [0,1,2,3,4,5,6]; });
            return parsed;
        }
        return [];
    } catch(error){ return []; }
}
function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
    localStorage.setItem("habitgrow_badges", JSON.stringify(badges));
}

// ==================================================
// Date System 
// ==================================================
function getKSTDate(){
    const koreaTime = new Date(new Date().getTime() + (9 * 60 * 60 * 1000));
    return koreaTime.toISOString().split("T")[0];
}
function addDays(dateString, amount){
    const parts = dateString.split('-');
    const date = new Date(parts[0], parts[1] - 1, parts[2]); 
    date.setDate(date.getDate() + amount);
    const yy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    return `${yy}-${mm}-${dd}`;
}
function getDayOfWeek(dateString) {
    const parts = dateString.split('-');
    const date = new Date(parts[0], parts[1] - 1, parts[2]); 
    return date.getDay();
}
function getLast30Days(){
    const result=[]; const today = getKSTDate();
    for(let i=29; i>=0; i--){ result.push(addDays(today, -i)); }
    return result; 
}

// ==================================================
// Statistics
// ==================================================
function getCompletedCount(history){ return Object.values(history).filter(Boolean).length; }

function calculateCurrentStreak(history, targetDays){
    let streak = 0; let current = getKSTDate();
    let currentDayOfWeek = getDayOfWeek(current);
    if(!history[current] && targetDays.includes(currentDayOfWeek)) { current = addDays(current, -1); }
    for(let i=0; i<365; i++) {
        let d = getDayOfWeek(current);
        if(!targetDays.includes(d)) { current = addDays(current, -1); continue; }
        if(history[current]){ streak++; current = addDays(current, -1); } else { break; }
    }
    return streak;
}

function calculateBestStreak(history, targetDays){
    const dates = Object.keys(history).filter(d=>history[d]).sort();
    let best = 0; let current = 0; let previous = null;
    dates.forEach(date => {
        if(previous) {
            let gapTargetDays = 0; let tempDate = addDays(previous, 1);
            while(tempDate < date) {
                if(targetDays.includes(getDayOfWeek(tempDate))) gapTargetDays++;
                tempDate = addDays(tempDate, 1);
            }
            if(gapTargetDays === 0) current++; else current = 1;
        } else { current = 1; }
        if(current > best) best = current;
        previous = date;
    });
    return best;
}

function calculateSuccessRate(history, targetDays){
    const dates = getLast30Days(); let targetCount = 0; let checkedCount = 0;
    dates.forEach(date => {
        if(targetDays.includes(getDayOfWeek(date))) {
            targetCount++;
            if(history[date]) checkedCount++;
        }
    });
    if (targetCount === 0) return 0;
    return Math.floor((checkedCount / targetCount) * 100);
}

// ==================================================
// Plant Growth & Badges Check
// ==================================================
function getStreakAtDate(history, dateStr, targetDays) {
    let streak = 0; let current = dateStr;
    for(let i=0; i<365; i++) {
        if(!targetDays.includes(getDayOfWeek(current))) { current = addDays(current, -1); continue; }
        if(history[current]){ streak++; current = addDays(current, -1); } else { break; }
    }
    return streak;
}
function getPlantLevel(history, dateStr, targetDays){
    const streak = getStreakAtDate(history, dateStr, targetDays);
    if(streak >= 7) return 5;
    if(streak >= 5) return 4;
    if(streak >= 3) return 3;
    if(streak >= 2) return 2;
    return 1;
}

function checkBadges(clickedDate) {
    let newlyEarned = null;
    if (!badges.tree) { if (habits.some(h => calculateBestStreak(h.history, h.targetDays) >= 3)) { badges.tree = true; newlyEarned = 'tree'; } }
    if (!badges.month) { if (habits.some(h => calculateBestStreak(h.history, h.targetDays) >= 30)) { badges.month = true; newlyEarned = 'month'; } }
    if (!badges.five) {
        let completedToday = habits.filter(h => h.history[clickedDate]).length;
        if (completedToday >= 5) { badges.five = true; newlyEarned = 'five'; }
    }
    if (newlyEarned) { saveData(); renderBadges(); showBadgeModal(newlyEarned); }
}
function renderBadges() {
    if (badges.tree) document.getElementById('badge-tree').classList.add('earned');
    if (badges.month) document.getElementById('badge-month').classList.add('earned');
    if (badges.five) document.getElementById('badge-five').classList.add('earned');
}

// ==================================================
// Habit Objects & UI
// ==================================================
function createHabit(title, targetDays){ return { id: Date.now().toString(), title, targetDays, history:{}, createdAt: getKSTDate() }; }
const habitList = document.getElementById("habit-list");
const habitInput = document.getElementById("habit-input");

document.getElementById("add-btn").addEventListener("click", addHabit);
habitInput.addEventListener("keydown", e=>{ if(e.key==="Enter") addHabit(); });

function addHabit(){
    const title = habitInput.value.trim();
    if(!title){ alert("습관을 입력해주세요."); return; }
    if(habits.some(h=>h.title===title)){ alert("이미 존재하는 습관입니다."); return; }
    const targetDays = getSelectedDays();
    if(targetDays.length === 0) { alert("최소 하루 이상의 목표 요일을 선택해주세요!"); return; }
    habits.unshift(createHabit(title, targetDays));
    saveData(); habitInput.value=""; renderFull(); 
}

function toggleDay(habitId, date){
    const habit = habits.find(h=>h.id===habitId);
    if(!habit) return;
    if(habit.history[date]){ delete habit.history[date]; } else { habit.history[date]=true; playPopSound(); }
    saveData(); updateHabitCard(habitId, date); checkBadges(date); 
}

function updateHabitCard(habitId, clickedDate) {
    const habit = habits.find(h => h.id === habitId);
    const card = document.querySelector(`.habit-card[data-id="${habitId}"]`);
    if(!card) return;
    card.querySelector('.stat-current').innerText = `🔥 ${calculateCurrentStreak(habit.history, habit.targetDays)}일 연속`;
    card.querySelector('.stat-best').innerText = `🏆 최장 ${calculateBestStreak(habit.history, habit.targetDays)}일`;
    card.querySelector('.stat-total').innerText = `🌱 총 ${getCompletedCount(habit.history)}회`;
    card.querySelector('.stat-rate').innerText = `📈 달성률 ${calculateSuccessRate(habit.history, habit.targetDays)}%`;

    const cells = card.querySelectorAll('.day-cell');
    cells.forEach(cell => {
        const date = cell.getAttribute('data-date');
        if(cell.classList.contains('disabled')) return;
        const isCompleted = habit.history[date];
        const existingPlant = cell.querySelector('.sprout-emoji');
        if (isCompleted) {
            cell.classList.add('completed');
            const targetClassName = `sprout-emoji level${getPlantLevel(habit.history, date, habit.targetDays)}`;
            if (existingPlant) { existingPlant.className = targetClassName; } 
            else { const plant = document.createElement('div'); plant.className = targetClassName; if (date === clickedDate) plant.classList.add('animate-pop'); cell.appendChild(plant); }
        } else {
            cell.classList.remove('completed');
            if (existingPlant) existingPlant.remove();
        }
    });
}

// ==================================================
// Yearly Modal (1년 기록)
// ==================================================
function openYearlyModal(habitId) {
    const habit = habits.find(h => h.id === habitId);
    if(!habit) return;
    
    document.getElementById('yearly-modal-title').innerText = `${habit.title} 🌳`;
    document.getElementById('yearly-modal-subtitle').innerText = `최근 1년(365일) 간의 정원 기록입니다.`;
    
    const grid = document.getElementById('yearly-grid-content');
    grid.innerHTML = '';
    
    const today = getKSTDate();
    const startDate = addDays(today, -364);
    
    // 일요일이 첫 번째 행에 오도록 빈 셀 채우기
    const startDayOfWeek = getDayOfWeek(startDate);
    for(let i = 0; i < startDayOfWeek; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'yearly-cell hidden';
        grid.appendChild(emptyCell);
    }
    
    // 365일치 셀 생성
    let currentDate = startDate;
    for(let i = 0; i <= 364; i++) {
        const cell = document.createElement('div');
        cell.className = 'yearly-cell';
        cell.title = currentDate;
        
        const dayOfWeek = getDayOfWeek(currentDate);
        if(!habit.targetDays.includes(dayOfWeek)) {
            cell.classList.add('disabled');
            cell.title += ' (쉬는 날)';
        } else if(habit.history[currentDate]) {
            cell.classList.add('completed');
            cell.title += ' (완료)';
        }
        
        grid.appendChild(cell);
        currentDate = addDays(currentDate, 1);
    }
    
    document.getElementById('yearly-modal').style.display = 'flex';
    
    // 모달이 열린 후 스크롤을 맨 오른쪽(가장 최근)으로 이동
    setTimeout(() => {
        const container = document.getElementById('yearly-container');
        container.scrollLeft = container.scrollWidth;
    }, 10);
}
function closeYearlyModal() { document.getElementById('yearly-modal').style.display = 'none'; }

// ==================================================
// Drag & Drop
// ==================================================
function setupDragAndDrop() {
    habitList.addEventListener('dragover', e => {
        e.preventDefault(); 
        const draggingCard = document.querySelector('.dragging');
        if (!draggingCard) return;
        const afterElement = getDragAfterElement(habitList, e.clientY);
        if (afterElement == null) { habitList.appendChild(draggingCard); } else { habitList.insertBefore(draggingCard, afterElement); }
    });
}
function getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll('.habit-card:not(.dragging)')];
    return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) { return { offset: offset, element: child }; } else { return closest; }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}
function updateHabitsOrder() {
    const currentCards = [...document.querySelectorAll('.habit-card')];
    const reorderedHabits = [];
    currentCards.forEach(card => {
        const id = card.getAttribute('data-id'); const habit = habits.find(h => h.id === id); if(habit) reorderedHabits.push(habit);
    });
    habits = reorderedHabits; saveData();
}

function getTargetDaysText(daysArray) {
    if(daysArray.length === 7) return "매일";
    const dayMap = {0:'일',1:'월',2:'화',3:'수',4:'목',5:'금',6:'토'};
    const sorted = [...daysArray].sort((a,b) => (a===0?7:a) - (b===0?7:b));
    return sorted.map(d => dayMap[d]).join(', ') + "요일";
}

// ==================================================
// Full Render
// ==================================================
function renderFull(){
    habitList.innerHTML="";
    if(habits.length===0){
        habitList.innerHTML=`<div class="habit-card" style="text-align:center; padding:40px;"><h3 style="margin-bottom:10px;">🌱 아직 심은 습관이 없습니다.</h3><p style="color:var(--text-muted);">새로운 습관을 추가해서 나만의 정원을 만들어보세요.</p></div>`;
        return;
    }
    const dates = getLast30Days();
    habits.forEach(habit=>{
        const card = document.createElement("div");
        card.className="habit-card"; card.setAttribute("data-id", habit.id); card.draggable = true;
        
        card.addEventListener('dragstart', () => { card.classList.add('dragging'); });
        card.addEventListener('dragend', () => { card.classList.remove('dragging'); updateHabitsOrder(); });
        
        card.innerHTML=`
        <div class="habit-header">
            <div style="display: flex; align-items: center;">
                <div class="drag-handle" title="드래그해서 순서 변경">☰</div>
                <div class="habit-title">
                    ${escapeHTML(habit.title)}
                    <span class="habit-days-badge">${getTargetDaysText(habit.targetDays)}</span>
                </div>
            </div>
            <div class="action-btns">
                <button class="icon-btn" onclick="openYearlyModal('${habit.id}')" title="1년 대형 정원 보기">📅 1년 기록</button>
                <button class="icon-btn danger" onclick="deleteHabit('${habit.id}')">삭제</button>
            </div>
        </div>
        <div class="stats" style="margin-bottom: 15px;">
            <div class="stat stat-current">🔥 ${calculateCurrentStreak(habit.history, habit.targetDays)}일 연속</div>
            <div class="stat stat-best">🏆 최장 ${calculateBestStreak(habit.history, habit.targetDays)}일</div>
            <div class="stat stat-total">🌱 총 ${getCompletedCount(habit.history)}회</div>
            <div class="stat stat-rate">📈 달성률 ${calculateSuccessRate(habit.history, habit.targetDays)}%</div>
        </div>
        <div class="grass-grid"></div>
        `;
        
        const grid = card.querySelector(".grass-grid");
        dates.forEach(date=>{
            const cell = document.createElement("div");
            cell.className="day-cell"; cell.setAttribute("data-date", date);
            
            if(!habit.targetDays.includes(getDayOfWeek(date))) {
                cell.classList.add("disabled"); cell.title = date + " (쉬는 날)";
            } else {
                if(habit.history[date]){
                    cell.classList.add("completed");
                    const plant = document.createElement("div");
                    plant.className = `sprout-emoji level${getPlantLevel(habit.history, date, habit.targetDays)}`;
                    cell.appendChild(plant);
                }
                cell.title=date;
                cell.addEventListener("click", ()=>toggleDay(habit.id, date));
            }
            grid.appendChild(cell);
        });
        habitList.appendChild(card);
    });
}
function escapeHTML(str){ return str.replace(/[&<>"']/g, char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[char]); }

// ==================================================
// Theme Management
// ==================================================
const themeSelect = document.getElementById("theme-select");
themeSelect.addEventListener("change", ()=>{
    const theme = themeSelect.value; document.documentElement.setAttribute("data-theme", theme); localStorage.setItem("habitgrow_theme", theme);
});
function loadTheme(){
    const theme = localStorage.getItem("habitgrow_theme") || "github"; document.documentElement.setAttribute("data-theme", theme); themeSelect.value=theme;
}

// ==================================================
// Backup / Restore
// ==================================================
function exportData(){
    const blob = new Blob([JSON.stringify(habits, null, 2)], {type: "application/json"}); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="HabitGrow_backup.json"; a.click(); URL.revokeObjectURL(url);
}
function importData(event){
    const file = event.target.files[0]; if(!file) return; const reader = new FileReader();
    reader.onload = function(e){
        try{ const data = JSON.parse(e.target.result); if(Array.isArray(data)){ habits=data; saveData(); renderFull(); renderBadges(); alert("복원이 완료되었습니다."); } }catch(error){ alert("올바른 백업 파일이 아닙니다."); }
    };
    reader.readAsText(file);
}

// Init
// ==================================================
function init(){
    document.getElementById("today-text").textContent = `오늘은 ${getKSTDate()} 입니다. 나만의 정원을 키워보세요 🌱`;
    loadTheme(); setupDragAndDrop(); renderFull(); renderBadges(); 
}
init();
